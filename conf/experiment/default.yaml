# General experimental hyperparameters (aligned with chapter_4.tex Table 4.1)
# For fast CI / testing runs, use: +experiment=ci  (overrides total_rounds and num_clients)
num_clients: 10
batch_size: 64            # B
local_epochs: 5           # E
learning_rate: 0.01       # eta
weight_decay: 0.0         # separate from momentum; tune per experiment
momentum: 0.9             # rho (SGD momentum, aligned with FL literature)
client_fraction: 0.1      # C (10% per round)
total_rounds: 100         # R per manuscript §4.3, Table 4.1
num_public_samples: 200   # |D_pub| per manuscript §4.3, Table 4.1

# Bandwidth and Compute heterogeneity settings
heterogeneity:
  bandwidth:
    min_mbps: 5.0
    max_mbps: 20.0
  compute:
    min_samples_per_sec: 100.0
    max_samples_per_sec: 500.0

# Telemetry settings
telemetry:
  wandb_enabled: false   # Set to true to log to WandB online
  project: "fedmaq-experiments"
  mode: "offline"        # "online" or "offline"
  run_name: null

# Local model checkpoint persistence for distillation baseline (e.g. FedMD)
persistence_dir: ".data_partitions/fedmd_models"
